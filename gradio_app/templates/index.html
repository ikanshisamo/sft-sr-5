<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sekolah Rakyat — AI Mentor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: { typeset: false }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#003441",
                        "surface-container-low": "#f4f5f6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#43474e",
                        "outline-variant": "#c4c7cc",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #FEFEFE !important;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .chat-scrollbar::-webkit-scrollbar { width: 6px; }
        .chat-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .chat-scrollbar::-webkit-scrollbar-thumb { background: #dbcbc8; border-radius: 10px; }
        .chat-scrollbar::-webkit-scrollbar-thumb:hover { background: #c4c7cc; }

        /* Bubble user tetap pakai style lama */
        .msg-user-tail {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 0 10px;
            border-color: transparent transparent transparent #007AFF;
            bottom: 0px;
            right: 0px;
            transform: translateX(30%);
        }

        /* Markdown & LaTeX output AI */
        .markdown-body { line-height: 1.75; color: #1e293b; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body strong { font-weight: 700; color: #003441; }
        .markdown-body em { font-style: italic; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-top: 0.4rem; margin-bottom: 0.4rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-top: 0.4rem; margin-bottom: 0.4rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body blockquote {
            border-left: 3px solid #003441;
            padding: 0.4rem 0.9rem;
            margin: 0.75rem 0;
            color: #003441;
            background: #f0f7f8;
            border-radius: 0 6px 6px 0;
            font-style: italic;
        }
        .markdown-body code {
            background: #f1f5f9;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: monospace;
        }
        .markdown-body pre {
            background: #f1f5f9;
            padding: 0.9rem 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75rem 0;
        }
        .markdown-body pre code { background: none; padding: 0; }
    </style>
</head>
<body class="text-slate-900 flex flex-col min-h-screen">
    
    <header class="border-b border-outline-variant flex items-center w-full px-8 h-16 max-w-[1440px] mx-auto sticky top-0 z-50" style="background-color: #FEFEFE;">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
            </div>
            <span class="text-lg font-bold text-primary tracking-tight">Sekolah Rakyat</span>
        </div>
    </header>

    <main class="flex-grow flex w-full max-w-[1440px] mx-auto overflow-hidden h-[calc(100vh-64px)]" style="background-color: #FEFEFE;">
        
        <div class="flex-grow flex flex-col relative border-r border-outline-variant">
            
            <div class="flex-grow overflow-y-auto chat-scrollbar px-8 md:px-12 py-8 space-y-12">
                
                <div id="welcome-screen" class="max-w-2xl mx-auto text-center mt-6 mb-10 transition-opacity duration-300">
                    <h1 class="text-2xl md:text-3xl font-bold tracking-tight mb-2 text-slate-800">
                        Halo, <span class="text-[#007AFF]">Sekolah Rakyat</span>
                    </h1>
                    <p class="text-sm md:text-base text-on-surface-variant">Mulailah diskusi dengan AI Mentor untuk mendalami topik materi hari ini.</p>
                </div>
                
            <div id="chat-container" class="max-w-2xl mx-auto flex flex-col space-y-4"></div>
                
                <div class="h-32"></div> 
            </div>
            
            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#FEFEFE] via-[#FEFEFE] to-transparent pb-8 pt-12 px-8 md:px-12">
                <div class="max-w-2xl mx-auto relative">
                    <div class="bg-white border border-outline-variant rounded-[24px] shadow-md p-1.5 focus-within:ring-2 focus-within:ring-primary/20 transition-all flex items-end">
                        <textarea id="message-input" class="flex-grow bg-transparent border-none focus:ring-0 text-base py-3 px-5 resize-none max-h-[140px] overflow-y-auto chat-scrollbar outline-none leading-relaxed text-slate-800" placeholder="Ketik pesan..." rows="1" style="min-height: 44px;"></textarea>
                        
                        <div class="flex items-center gap-1 pb-1.5 pr-2 shrink-0">
                            <button id="clear-btn" class="p-2.5 text-on-surface-variant hover:text-error hover:bg-error-container rounded-full transition-colors flex items-center justify-center" title="Bersihkan Obrolan">
                                    <span class="material-symbols-outlined text-xl">delete_sweep</span>
                            </button>
                            <button id="send-btn" class="w-9 h-9 bg-[#007AFF] text-white rounded-full flex items-center justify-center shadow-sm active:scale-95 transition-transform" title="Kirim">
                                    <span class="material-symbols-outlined text-lg">arrow_upward</span>
                            </button>
                        </div>
                    </div>
                    <p class="text-center mt-2.5 text-xs text-on-surface-variant/70">Tekan Enter untuk kirim, Shift + Enter untuk baris baru.</p>
                </div>
            </div>
        </div>

        <aside class="hidden lg:flex flex-col h-full py-6 px-4 gap-4 w-80 bg-surface-container-low shrink-0">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-xs font-bold uppercase tracking-wider text-primary">Konfigurasi Model</h2>
            </div>

            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm shrink-0">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-semibold text-slate-800">Mode</span>
                </div>
                <select id="mode-select" class="w-full bg-slate-50 border border-outline-variant rounded-lg p-2.5 text-sm text-slate-700 focus:ring-1 focus:ring-[#007AFF] focus:bg-white outline-none">
                    <option value="Materi">Materi</option>
                    <option value="Essay">Essay</option>
                    <option value="Pilihan Ganda">Pilihan Ganda</option>
                </select>
            </div>

            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm shrink-0">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-semibold text-slate-800">Label Emosi</span>
                </div>
                <select id="emotion-select" class="w-full bg-slate-50 border border-outline-variant rounded-lg p-2.5 text-sm text-slate-700 focus:ring-1 focus:ring-[#007AFF] focus:bg-white outline-none">
                    <option value="netral">Netral</option>
                    <option value="antusias">Antusias</option>
                    <option value="bingung">Bingung</option>
                    <option value="bosan">Bosan</option>
                    <option value="frustrasi">Frustrasi</option>
                </select>
                <p class="text-xs text-on-surface-variant/70 mt-2">Simulasi label dari face emotion recognition.</p>
            </div>

            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm flex-grow flex flex-col max-h-[85vh]">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-semibold text-slate-800">System Prompt</span>
                </div>
                
                <textarea id="system-prompt-input" class="w-full flex-grow bg-slate-50 border border-outline-variant rounded-lg p-3 text-sm text-slate-700 resize-none focus:ring-1 focus:ring-[#007AFF] focus:bg-white outline-none chat-scrollbar leading-relaxed" placeholder="Instruksi sistem tidak boleh kosong..."></textarea>
                
                <button id="save-prompt-btn" class="w-full mt-3 bg-[#007AFF] hover:bg-blue-600 text-white text-sm font-medium py-2 px-4 rounded-lg active:scale-95 transition-all flex items-center justify-center shadow-sm" title="Terapkan Perubahan Prompt">
                    <span id="save-btn-text">Simpan Prompt</span>
                </button>
            </div>
        </aside>
    </main>

    <script>
        let PREDEFINED_PROMPTS = {};

        let currentMode = "Materi";
        let chatHistory = [];
        let activeSystemPrompt = "";

        const textarea = document.getElementById('message-input');
        const sysPromptInput = document.getElementById('system-prompt-input');
        const modeSelect = document.getElementById('mode-select');
        const emotionSelect = document.getElementById('emotion-select');
        const chatContainer = document.getElementById('chat-container');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const savePromptBtn = document.getElementById('save-prompt-btn');
        const saveBtnText = document.getElementById('save-btn-text');
        const welcomeScreen = document.getElementById('welcome-screen');

        async function loadPrompts() {
            try {
                const res = await fetch('/api/prompts');
                const data = await res.json();
                if (data.status === "success") {
                    PREDEFINED_PROMPTS = data.prompts;
                    activeSystemPrompt = PREDEFINED_PROMPTS[currentMode];
                    sysPromptInput.value = activeSystemPrompt;
                } else {
                    sysPromptInput.value = "Gagal memuat system prompt dari server.";
                }
            } catch (error) {
                sysPromptInput.value = "Gagal memuat system prompt dari server.";
            }
        }

        loadPrompts();

        // FITUR BARU: Auto-save setiap kali ada ketikan di kotak System Prompt
        sysPromptInput.addEventListener('input', function() {
            activeSystemPrompt = this.value;
            PREDEFINED_PROMPTS[currentMode] = this.value;
        });

        function switchMode(mode) {
            currentMode = mode;
            sysPromptInput.value = PREDEFINED_PROMPTS[mode];
            activeSystemPrompt = PREDEFINED_PROMPTS[mode];
        }

        modeSelect.addEventListener('change', function() {
            switchMode(this.value);
        });

        savePromptBtn.addEventListener('click', () => {
            const currentInputValue = sysPromptInput.value.trim();
            
            PREDEFINED_PROMPTS[currentMode] = currentInputValue;
            activeSystemPrompt = currentInputValue;
            
            savePromptBtn.classList.remove('bg-[#007AFF]', 'hover:bg-blue-600');
            savePromptBtn.classList.add('bg-emerald-600');
            saveBtnText.textContent = 'Prompt Diperbarui!';
            
            setTimeout(() => {
                savePromptBtn.classList.remove('bg-emerald-600');
                savePromptBtn.classList.add('bg-[#007AFF]', 'hover:bg-blue-600');
                saveBtnText.textContent = 'Simpan Prompt';
            }, 1800);
        });

        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function appendUserMessage(text) {
            const msgHTML = `
            <div class="user-message flex flex-col items-end w-full py-2">
                <div class="relative bg-[#007AFF] text-white py-2.5 px-4 rounded-[20px] rounded-br-[4px] max-w-[78%] shadow-sm">
                    <p class="text-[15px] leading-relaxed whitespace-pre-wrap">${text}</p>
                    <div class="msg-user-tail"></div>
                </div>
            </div>`;
            chatContainer.insertAdjacentHTML('beforeend', msgHTML);
            scrollToBottom();
        }

        // Render Markdown + LaTeX — tampilan terbuka tanpa bubble
        function appendAIMessage(text) {
            const parsedHTML = marked.parse(text);

            const msgHTML = `
            <div class="ai-message w-full py-2">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-7 h-7 rounded-full bg-primary flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-[15px] text-white" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
                    </div>
                    <span class="text-xs font-semibold text-primary uppercase tracking-wide">AI Mentor</span>
                </div>
                <div class="pl-9 text-[15px] leading-relaxed markdown-body">${parsedHTML}</div>
            </div>`;

            chatContainer.insertAdjacentHTML('beforeend', msgHTML);

            // Render LaTeX setelah elemen masuk ke DOM
            if (window.MathJax) {
                MathJax.typesetPromise([chatContainer.lastElementChild])
                    .catch((err) => console.warn('MathJax error:', err));
            }

            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.lastElementChild?.scrollIntoView({ behavior: "smooth", block: "end" });
        }

        async function sendMessage() {
            const message = textarea.value.trim();
            if (!message) return;

            if (welcomeScreen) welcomeScreen.style.display = 'none';

            appendUserMessage(message);
            textarea.value = '';
            textarea.style.height = 'auto';

            const loadingId = 'loading-' + Date.now();
            chatContainer.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="text-slate-400 text-xs italic ml-11 mb-2">Memproses balasan...</div>`);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        history: chatHistory,
                        system_prompt: activeSystemPrompt,
                        emotion: emotionSelect.value
                    })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                if (data.status === "success") {
                    appendAIMessage(data.response);
                    chatHistory = data.history;
                } else {
                    appendAIMessage("Gagal memproses pesan: " + data.message);
                }
            } catch (error) {
                document.getElementById(loadingId)?.remove();
                appendAIMessage("Terjadi kesalahan jaringan atau server tidak merespons.");
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            chatHistory = [];
            if (welcomeScreen) welcomeScreen.style.display = 'block';
        });
    </script>
</body>
</html>
